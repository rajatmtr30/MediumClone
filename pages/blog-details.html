<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details - MediumClone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="container-sm py-12">
        <div id="blog-container">
            <!-- Loading Skeleton -->
            <div class="article-header">
                <div class="skeleton skeleton-title" style="height: 3rem; width: 100%;"></div>
                <div class="skeleton skeleton-title" style="height: 1.5rem; width: 80%; margin-bottom: 2rem;"></div>
                
                <div class="author-info-large flex gap-4">
                    <div class="skeleton author-avatar-large"></div>
                    <div class="flex-1">
                        <div class="skeleton skeleton-text w-24"></div>
                        <div class="skeleton skeleton-text w-32"></div>
                    </div>
                </div>
            </div>
            
            <div class="skeleton article-hero-image"></div>
            
            <div class="article-content mt-8">
                <div class="skeleton skeleton-text w-full mb-2"></div>
                <div class="skeleton skeleton-text w-full mb-2"></div>
                <div class="skeleton skeleton-text w-full mb-2"></div>
                <div class="skeleton skeleton-text w-3/4 mb-6"></div>
                
                <div class="skeleton skeleton-text w-full mb-2"></div>
                <div class="skeleton skeleton-text w-full mb-2"></div>
                <div class="skeleton skeleton-text w-1/2"></div>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <!-- Comments Section Placeholder -->
        <section class="comments-section py-8">
            <h3 class="font-bold text-xl mb-6">Responses (42)</h3>
            <div class="form-group">
                <textarea class="form-control" rows="3" placeholder="What are your thoughts?"></textarea>
            </div>
            <div class="flex justify-end mb-8">
                <button class="btn btn-primary">Respond</button>
            </div>
            
            <!-- Dummy Comment -->
            <div class="flex gap-4 mb-6">
                <img src="https://i.pravatar.cc/150?u=user1" alt="User" class="author-avatar" style="width: 32px; height: 32px;">
                <div class="flex-1 border p-4" style="border-color: var(--border-color); border-radius: var(--radius-md);">
                    <div class="flex items-center justify-between mb-2">
                        <div>
                            <div class="font-medium text-sm">Mike Ross</div>
                            <div class="text-xs text-secondary">2 days ago</div>
                        </div>
                    </div>
                    <p class="text-sm">This is a fantastic read! Completely changed my perspective on the topic. Looking forward to more content like this.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../js/components.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
</body>
</html>
