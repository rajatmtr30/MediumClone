<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MediumClone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container py-12">
        <div class="max-w-[600px] mx-auto" style="max-width: 600px; margin: 0 auto;">
            <h1 class="font-serif mb-6" style="font-size: 3rem;">Contact Us</h1>
            <p class="text-secondary mb-8 text-lg">Have a question or feedback? We'd love to hear from you.</p>
            
            <form onsubmit="event.preventDefault(); showToast('Message sent successfully!'); this.reset();">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" required placeholder="Your name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Topic</label>
                    <select class="form-control" required>
                        <option value="">Select a topic</option>
                        <option value="support">General Support</option>
                        <option value="billing">Billing</option>
                        <option value="report">Report Content</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" required placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem; border-radius: 999px;">Send Message</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/components.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
